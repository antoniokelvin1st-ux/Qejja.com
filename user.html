<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" href="favicon.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>User Profile - qeja</title>
<link rel="stylesheet" href="style.css">

<style>
body{padding-bottom:80px;background:#f4f4f4;}
.top-appbar{background:#111;color:white;padding:18px 7%;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;}
.logo{font-size:30px;font-weight:900;color:#ff7a18;}
.user-wrap{max-width:900px;margin:auto;padding:25px 7% 100px;}
.user-card{text-align:center;background:white;border-radius:22px;padding:28px 18px;box-shadow:0 8px 20px rgba(0,0,0,.08);}
.profile-pic{width:120px;height:120px;border-radius:50%;object-fit:cover;border:4px solid #ff7a18;background:#eee;}
.username{font-size:28px;font-weight:900;margin-top:12px;}
.handle{color:#777;font-weight:bold;margin-top:3px;}
.bio{max-width:620px;margin:12px auto;color:#333;}
.follow-btn{background:#ff7a18;color:white;border:none;padding:12px 28px;border-radius:30px;font-weight:bold;cursor:pointer;margin-top:12px;}
.stats{display:flex;justify-content:center;gap:30px;margin-top:22px;flex-wrap:wrap;}
.stat strong{font-size:22px;display:block;}
.stat span{color:#777;font-weight:bold;}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;margin-top:25px;}
.grid-card{background:white;overflow:hidden;}
.grid-card img{width:100%;height:220px;object-fit:cover;background:#ddd;}
.grid-info{padding:10px;background:white;}
.grid-info h4{font-size:14px;margin-bottom:4px;}
.grid-info p{font-size:13px;color:#555;}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:white;border-top:1px solid #ddd;height:70px;display:flex;justify-content:space-around;align-items:center;z-index:200;}
.bottom-nav a{text-decoration:none;color:#555;font-size:13px;font-weight:bold;text-align:center;}
.bottom-nav span{display:block;font-size:23px;}
.post-plus{background:#111;color:white!important;width:58px;height:58px;border-radius:18px;display:flex;align-items:center;justify-content:center;margin-top:-28px;border:4px solid #ff7a18;}
.post-plus span{font-size:34px;}
@media(max-width:700px){.grid-card img{height:150px;}}
</style>
</head>

<body>

<header class="top-appbar">
    <div class="logo">qeja</div>
    <a href="index.html" style="color:white;text-decoration:none;font-weight:bold;">Back</a>
</header>

<main class="user-wrap">
    <section class="user-card">
        <img id="profileImage" class="profile-pic" src="https://i.pravatar.cc/200" alt="Profile">
        <div id="profileName" class="username">Loading...</div>
        <div id="profileHandle" class="handle">@qeja.user</div>
        <p id="profileBio" class="bio">Loading bio...</p>

        <button id="followBtn" class="follow-btn">Follow</button>

        <div class="stats">
            <div class="stat">
                <strong id="listingsCount">0</strong>
                <span>Listings</span>
            </div>
            <div class="stat">
                <strong id="followersCount">0</strong>
                <span>Followers</span>
            </div>
            <div class="stat">
                <strong id="followingCount">0</strong>
                <span>Following</span>
            </div>
            <div class="stat">
                <strong id="likesCount">0</strong>
                <span>Likes</span>
            </div>
        </div>
    </section>

    <div id="userPostsGrid" class="grid"></div>
</main>

<nav class="bottom-nav">
    <a href="index.html"><span>🏠</span>Home</a>
    <a href="explore.html"><span>🔍</span>Explore</a>
    <a href="post.html" class="post-plus"><span>+</span></a>
    <a href="inbox.html"><span>💬</span>Inbox</a>
    <a href="profile.html"><span>👤</span>Profile</a>
</nav>

<script type="module">
import { auth, database } from "./firebase.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.4.0/firebase-auth.js";
import { ref, get, set, remove, onValue, push } from "https://www.gstatic.com/firebasejs/12.4.0/firebase-database.js";

let currentUser = null;
let targetUserId = null;
let targetUserData = null;

const params = new URLSearchParams(window.location.search);
targetUserId = params.get("id");

onAuthStateChanged(auth, async (user) => {
    if (!user) {
        window.location.href = "login.html";
        return;
    }

    currentUser = user;

    if (!targetUserId) {
        alert("No user selected.");
        window.location.href = "index.html";
        return;
    }

    if (targetUserId === currentUser.uid) {
        window.location.href = "profile.html";
        return;
    }

    await loadUserProfile();
    loadFollowStatus();
    loadFollowerCounts();
    loadUserPosts();
});

async function loadUserProfile() {
    const snap = await get(ref(database, "users/" + targetUserId));

    if (!snap.exists()) {
        alert("User not found.");
        window.location.href = "index.html";
        return;
    }

    targetUserData = snap.val();

    document.getElementById("profileName").textContent = targetUserData.fullName || "qeja User";
    document.getElementById("profileHandle").textContent = "@" + (targetUserData.handle || targetUserData.fullName || "qeja.user").toString().replace(/\s+/g, ".").toLowerCase();
    document.getElementById("profileBio").textContent = targetUserData.bio || "No bio added yet.";

    if (targetUserData.photoURL) {
        document.getElementById("profileImage").src = targetUserData.photoURL;
    }
}

async function loadFollowStatus() {
    const followSnap = await get(ref(database, `followers/${targetUserId}/${currentUser.uid}`));

    const btn = document.getElementById("followBtn");

    if (followSnap.exists()) {
        btn.textContent = "Following";
        btn.style.background = "#111";
    } else {
        btn.textContent = "Follow";
        btn.style.background = "#ff7a18";
    }
}

document.getElementById("followBtn").addEventListener("click", async () => {
    const followerRef = ref(database, `followers/${targetUserId}/${currentUser.uid}`);
    const followingRef = ref(database, `following/${currentUser.uid}/${targetUserId}`);

    const snap = await get(followerRef);

    if (snap.exists()) {
        await remove(followerRef);
        await remove(followingRef);
    } else {
        await set(followerRef, true);
        await set(followingRef, true);

        const notificationRef = push(ref(database, `notifications/${targetUserId}`));
        await set(notificationRef, {
            notificationId: notificationRef.key,
            type: "follow",
            fromUserId: currentUser.uid,
            message: "started following you",
            createdAt: new Date().toISOString(),
            read: false
        });
    }

    loadFollowStatus();
    loadFollowerCounts();
});
