<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>User Profile - QEJA</title>
<link rel="stylesheet" href="style.css">

<style>
body{padding-bottom:90px;background:#f4f4f4;}
.top-appbar{background:#111;color:white;padding:18px 7%;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;}
.logo{font-size:30px;font-weight:900;color:#ff7a18;}
.user-wrap{max-width:900px;margin:auto;padding:25px 7% 100px;}
.user-card{text-align:center;background:white;border-radius:22px;padding:28px 18px;box-shadow:0 8px 20px rgba(0,0,0,.08);}
.profile-pic{width:120px;height:120px;border-radius:50%;object-fit:cover;border:4px solid #ff7a18;background:#eee;}
.username{font-size:28px;font-weight:900;margin-top:12px;}
.handle{color:#777;font-weight:bold;margin-top:3px;}
.bio{max-width:620px;margin:12px auto;color:#333;}
.btn-row{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;margin-top:12px;}
.follow-btn,.message-btn{border:none;padding:12px 28px;border-radius:30px;font-weight:bold;cursor:pointer;}
.follow-btn{background:#ff7a18;color:white;}
.message-btn{background:#111;color:white;}
.stats{display:flex;justify-content:center;gap:30px;margin-top:22px;flex-wrap:wrap;}
.stat strong{font-size:22px;display:block;}
.stat span{color:#777;font-weight:bold;}
.profile-tabs{display:flex;justify-content:center;gap:12px;margin:24px 0;flex-wrap:wrap;}
.tab-btn{border:none;background:white;padding:10px 18px;border-radius:25px;font-weight:bold;cursor:pointer;}
.tab-btn.active{background:#ff7a18;color:white;}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;margin-top:20px;}
.grid-card{background:white;overflow:hidden;}
.grid-card img{width:100%;height:220px;object-fit:cover;background:#ddd;}
.grid-info{padding:10px;background:white;}
.grid-info h4{font-size:14px;margin-bottom:4px;}
.grid-info p{font-size:13px;color:#555;}

.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#111;border-top:1px solid rgba(255,255,255,.08);height:74px;display:flex;justify-content:space-around;align-items:center;z-index:200;box-shadow:0 -8px 25px rgba(0,0,0,.25);}
.bottom-nav a{text-decoration:none;color:#ddd;font-size:12px;font-weight:bold;text-align:center;}
.bottom-nav span{display:block;font-size:24px;margin-bottom:2px;}
.bottom-nav a:hover{color:#ff7a18;}
.post-plus{background:#ff7a18;color:white!important;width:62px;height:62px;border-radius:22px;display:flex;align-items:center;justify-content:center;margin-top:-34px;border:5px solid #111;box-shadow:0 0 18px rgba(255,122,24,.7);animation:qejaPulse 1.8s infinite;}
.post-plus span{font-size:34px;}
@keyframes qejaPulse{0%{transform:scale(1);}50%{transform:scale(1.08);}100%{transform:scale(1);}}
@media(max-width:700px){.grid-card img{height:150px;}.user-wrap{padding:18px 4% 95px;}}
</style>
</head>

<body>

<header class="top-appbar">
    <div class="logo">QEJA</div>
    <a href="index.html" style="color:white;text-decoration:none;font-weight:bold;">Back</a>
</header>

<main class="user-wrap">
    <section class="user-card">
        <img id="profileImage" class="profile-pic" src="https://i.pravatar.cc/200" alt="Profile">

        <div id="profileName" class="username">Loading...</div>
        <div id="profileHandle" class="handle">@qeja.user</div>
        <p id="profileBio" class="bio">Loading bio...</p>

        <div class="btn-row">
            <button id="followBtn" class="follow-btn">Follow</button>
            <button id="messageBtn" class="message-btn">Message</button>
        </div>

        <div class="stats">
            <div class="stat">
                <strong id="listingsCount">0</strong>
                <span>Listings</span>
            </div>
            <div class="stat">
                <strong id="followersCount">0</strong>
                <span>Followers</span>
            </div>
            <div class="stat">
                <strong id="followingCount">0</strong>
                <span>Following</span>
            </div>
            <div class="stat">
                <strong id="likesCount">0</strong>
                <span>Likes</span>
            </div>
        </div>
    </section>

    <div class="profile-tabs">
        <button class="tab-btn active" onclick="showTab('posts')">Posts</button>
        <button class="tab-btn" onclick="showTab('reels')">Reels</button>
    </div>

    <section id="postsTab">
        <div id="userPostsGrid" class="grid"></div>
    </section>

    <section id="reelsTab" style="display:none;">
        <div id="userReelsGrid" class="grid"></div>
    </section>
</main>

<nav class="bottom-nav">
    <a href="index.html"><span>⌂</span>Home</a>
    <a href="explore.html"><span>🧭</span>Discover</a>
    <a href="post.html" class="post-plus"><span>＋</span></a>
    <a href="inbox.html"><span>🔔</span>Activity</a>
    <a href="profile.html"><span>◎</span>Profile</a>
</nav>

<script type="module">
import { auth, database } from "./firebase.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { ref, get, set, remove, onValue, push } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

let currentUser = null;
let currentUserData = null;
let targetUserId = null;
let targetUserData = null;
let userPosts = [];

const params = new URLSearchParams(window.location.search);
targetUserId = params.get("id");

onAuthStateChanged(auth, async (user) => {
    if (!user) {
        window.location.href = "login.html";
        return;
    }

    currentUser = user;

    const mySnap = await get(ref(database, "users/" + currentUser.uid));
    currentUserData = mySnap.exists() ? mySnap.val() : {
        fullName: "QEJA User",
        email: currentUser.email
    };

    if (!targetUserId || targetUserId === "undefined" || targetUserId === "null") {
        alert("No user selected.");
        window.location.href = "index.html";
        return;
    }

    if (targetUserId === currentUser.uid) {
        window.location.href = "profile.html";
        return;
    }

    await loadUserProfile();
    loadFollowStatus();
    loadFollowerCounts();
    loadUserPosts();
});

async function loadUserProfile() {
    const snap = await get(ref(database, "users/" + targetUserId));

    if (!snap.exists()) {
        alert("User not found.");
        window.location.href = "index.html";
        return;
    }

    targetUserData = snap.val();

    document.getElementById("profileName").textContent = targetUserData.fullName || "QEJA User";
    document.getElementById("profileHandle").textContent = "@" + (targetUserData.handle || targetUserData.fullName || "qeja.user").toString().replace(/\s+/g, ".").toLowerCase();
    document.getElementById("profileBio").textContent = targetUserData.bio || "No bio added yet.";

    if (targetUserData.photoURL) {
        document.getElementById("profileImage").src = targetUserData.photoURL;
    }
}

async function loadFollowStatus() {
    const btn = document.getElementById("followBtn");
    const followSnap = await get(ref(database, `followers/${targetUserId}/${currentUser.uid}`));

    if (followSnap.exists()) {
        btn.textContent = "Following";
        btn.style.background = "#111";
    } else {
        btn.textContent = "Follow";
        btn.style.background = "#ff7a18";
    }
}

document.getElementById("followBtn").addEventListener("click", async () => {
    if (!currentUser || !targetUserId) {
        alert("User not ready. Refresh and try again.");
        return;
    }

    if (currentUser.uid === targetUserId) {
        alert("You cannot follow yourself.");
        return;
    }

    const followerRef = ref(database, `followers/${targetUserId}/${currentUser.uid}`);
    const followingRef = ref(database, `following/${currentUser.uid}/${targetUserId}`);

    const followSnap = await get(followerRef);

    if (followSnap.exists()) {
        await remove(followerRef);
        await remove(followingRef);
    } else {
        await set(followerRef, {
            userId: currentUser.uid,
            userName: currentUserData.fullName || "QEJA User",
            userPhoto: currentUserData.photoURL || "",
            followedAt: new Date().toISOString()
        });

        await set(followingRef, {
            userId: targetUserId,
            userName: targetUserData.fullName || "QEJA User",
            userPhoto: targetUserData.photoURL || "",
            followedAt: new Date().toISOString()
        });

        const notificationRef = push(ref(database, `notifications/${targetUserId}`));
        await set(notificationRef, {
            notificationId: notificationRef.key,
            type: "follow",
            fromUserId: currentUser.uid,
            fromUserName: currentUserData.fullName || "QEJA User",
            fromUserPhoto: currentUserData.photoURL || "",
            message: "started following you",
            createdAt: new Date().toISOString(),
            read: false
        });
    }

    await loadFollowStatus();
    loadFollowerCounts();
});

document.getElementById("messageBtn").addEventListener("click", () => {
    if (!targetUserId) {
        alert("User not found.");
        return;
    }

    if (targetUserId === currentUser.uid) {
        alert("You cannot message yourself.");
        return;
    }

    window.location.href = `chat.html?user=${targetUserId}`;
});

function countSnapshotChildren(snapshot) {
    let count = 0;
    if (snapshot.exists()) {
        snapshot.forEach(() => count++);
    }
    return count;
}

function loadFollowerCounts() {
    onValue(ref(database, `followers/${targetUserId}`), (snapshot) => {
        document.getElementById("followersCount").textContent = countSnapshotChildren(snapshot);
    });

    onValue(ref(database, `following/${targetUserId}`), (snapshot) => {
        document.getElementById("followingCount").textContent = countSnapshotChildren(snapshot);
    });
}

function loadUserPosts() {
    onValue(ref(database, "posts"), (snapshot) => {
        userPosts = [];

        if (snapshot.exists()) {
            snapshot.forEach(child => {
                const post = child.val();

                if (post.ownerId === targetUserId && (!post.status || post.status === "public")) {
                    userPosts.push(post);
                }
            });
        }

        userPosts.sort((a,b) => new Date(b.createdAt || 0) - new Date(a.createdAt || 0));

        renderPosts();
        renderReels();
        renderPostStats();
    });
}

function renderPostStats() {
    let likes = 0;
    let listings = 0;

    userPosts.forEach(post => {
        likes += post.likesCount || post.likes || 0;

        if (!post.videoURL || post.type !== "Reel") {
            listings++;
        }
    });

    document.getElementById("listingsCount").textContent = listings;
    document.getElementById("likesCount").textContent = likes;
}

function renderPosts() {
    const grid = document.getElementById("userPostsGrid");
    grid.innerHTML = "";

    const posts = userPosts.filter(post => post.type !== "Reel");

    if (posts.length === 0) {
        grid.innerHTML = "<p style='padding:20px;'>No posts yet.</p>";
        return;
    }

    posts.forEach(post => {
        const image = post.imageURL || "https://images.unsplash.com/photo-1564013799919-ab600027ffc6";

        const card = document.createElement("div");
        card.className = "grid-card";

        card.innerHTML = `
            <a href="details.html?id=${post.postId}">
                <img src="${image}" onerror="this.src='https://images.unsplash.com/photo-1564013799919-ab600027ffc6'">
            </a>
            <div class="grid-info">
                <h4>${post.title || "Property"}</h4>
                <p>${post.price || ""}</p>
            </div>
        `;

        grid.appendChild(card);
    });
}

function renderReels() {
    const grid = document.getElementById("userReelsGrid");
    grid.innerHTML = "";

    const reels = userPosts.filter(post => post.type === "Reel" || post.videoURL);

    if (reels.length === 0) {
        grid.innerHTML = "<p style='padding:20px;'>No reels yet.</p>";
        return;
    }

    reels.forEach(post => {
        const image = post.imageURL || "https://images.unsplash.com/photo-1564013799919-ab600027ffc6";

        const card = document.createElement("div");
        card.className = "grid-card";

        card.innerHTML = `
            <a href="details.html?id=${post.postId}">
                <img src="${image}" onerror="this.src='https://images.unsplash.com/photo-1564013799919-ab600027ffc6'">
            </a>
            <div class="grid-info">
                <h4>${post.title || "Reel"}</h4>
                <p>🎬 Reel</p>
            </div>
        `;

        grid.appendChild(card);
    });
}

window.showTab = function(tab) {
    document.getElementById("postsTab").style.display = "none";
    document.getElementById("reelsTab").style.display = "none";

    document.querySelectorAll(".tab-btn").forEach(btn => btn.classList.remove("active"));

    if (tab === "posts") {
        document.getElementById("postsTab").style.display = "block";
        document.querySelectorAll(".tab-btn")[0].classList.add("active");
    }

    if (tab === "reels") {
        document.getElementById("reelsTab").style.display = "block";
        document.querySelectorAll(".tab-btn")[1].classList.add("active");
    }
};
</script>

</body>
</html>
