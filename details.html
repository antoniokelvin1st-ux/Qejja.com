<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Property Details - QEJA</title>
<link rel="stylesheet" href="style.css">

<style>
body{padding-bottom:90px;background:#f4f4f4;}
.top-appbar{background:#111;color:white;padding:18px 7%;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;}
.logo{font-size:30px;font-weight:900;color:#ff7a18;}
.details-wrap{max-width:900px;margin:auto;padding:25px 7% 100px;}
.details-card{background:white;border-radius:22px;overflow:hidden;box-shadow:0 8px 20px rgba(0,0,0,.08);}
.details-card img.main-img{width:100%;height:420px;object-fit:cover;background:#eee;}
.details-info{padding:22px;}
.price{color:#ff7a18;font-weight:900;font-size:24px;margin:10px 0;}
.action-row{display:flex;gap:10px;flex-wrap:wrap;margin:18px 0;}
.action-row a,.action-row button{border:none;text-decoration:none;padding:12px 18px;border-radius:25px;font-weight:bold;cursor:pointer;}
.orange{background:#ff7a18;color:white;}
.dark{background:#111;color:white;}
.green{background:#25D366;color:white;}
.blue{background:#0077cc;color:white;}

.owner-box{background:#f4f4f4;border-radius:18px;padding:16px;margin-top:18px;display:flex;gap:14px;align-items:center;}
.owner-box img{width:58px;height:58px;border-radius:50%;object-fit:cover;border:3px solid #ff7a18;background:#eee;}
.owner-info{flex:1;}
.owner-info a{text-decoration:none;color:#111;font-weight:900;}
.owner-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;}
.owner-actions a,.owner-actions button{padding:8px 14px;border-radius:20px;border:none;text-decoration:none;font-weight:bold;cursor:pointer;font-size:13px;}

.gallery-strip{display:flex;gap:8px;overflow-x:auto;padding:10px 0;}
.gallery-strip img{width:80px;height:70px;object-fit:cover;border-radius:10px;cursor:pointer;border:2px solid transparent;}
.gallery-strip img.active{border-color:#ff7a18;}

/* QEJA Bottom Navigation */
.bottom-nav{
    position:fixed;
    bottom:0;
    left:0;
    right:0;
    background:#111;
    border-top:1px solid rgba(255,255,255,.08);
    height:74px;
    display:flex;
    justify-content:space-around;
    align-items:center;
    z-index:200;
    box-shadow:0 -8px 25px rgba(0,0,0,.25);
}
.bottom-nav a{
    text-decoration:none;
    color:#ddd;
    font-size:12px;
    font-weight:bold;
    text-align:center;
}
.bottom-nav span{
    display:block;
    font-size:24px;
    margin-bottom:2px;
}
.bottom-nav a:hover{color:#ff7a18;}
.post-plus{
    background:#ff7a18;
    color:white!important;
    width:62px;
    height:62px;
    border-radius:22px;
    display:flex;
    align-items:center;
    justify-content:center;
    margin-top:-34px;
    border:5px solid #111;
    box-shadow:0 0 18px rgba(255,122,24,.7);
    animation:qejaPulse 1.8s infinite;
}
.post-plus span{font-size:34px;}
@keyframes qejaPulse{
    0%{transform:scale(1);}
    50%{transform:scale(1.08);}
    100%{transform:scale(1);}
}
</style>
</head>

<body>

<header class="top-appbar">
    <div class="logo">QEJA</div>
    <a href="index.html" style="color:white;text-decoration:none;font-weight:bold;">Back</a>
</header>

<main class="details-wrap">
    <div id="detailsContainer">Loading property...</div>
</main>

<nav class="bottom-nav">
    <a href="index.html"><span>⌂</span>Home</a>
    <a href="explore.html"><span>🧭</span>Discover</a>
    <a href="post.html" class="post-plus"><span>＋</span></a>
    <a href="inbox.html"><span>🔔</span>Activity</a>
    <a href="profile.html"><span>◎</span>Profile</a>
</nav>

<script type="module">
import { auth, database } from "./firebase.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { ref, get, push, set, update, remove } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

let currentUser = null;
let currentUserData = null;
let currentPost = null;
let displayViews = 0;

const params = new URLSearchParams(window.location.search);
const postId = params.get("id");

onAuthStateChanged(auth, async (user) => {
    if (!user) {
        window.location.href = "login.html";
        return;
    }

    currentUser = user;

    const userSnap = await get(ref(database, "users/" + user.uid));
    currentUserData = userSnap.exists() ? userSnap.val() : {
        fullName: "QEJA User",
        email: user.email
    };

    loadDetails();
});

function cleanPhone(phone) {
    if (!phone) return "";
    let cleaned = phone.replace(/\D/g, "");

    if (cleaned.startsWith("0")) {
        cleaned = "254" + cleaned.substring(1);
    }

    if (!cleaned.startsWith("254")) {
        cleaned = "254" + cleaned;
    }

    return cleaned;
}

async function countUniqueView(post) {
    const viewRef = ref(database, `postViews/${postId}/${currentUser.uid}`);
    const viewSnap = await get(viewRef);

    displayViews = post.views || 0;

    if (!viewSnap.exists()) {
        await set(viewRef, {
            userId: currentUser.uid,
            viewedAt: new Date().toISOString()
        });

        displayViews = displayViews + 1;

        await update(ref(database, "posts/" + postId), {
            views: displayViews
        });
    }
}

async function loadDetails() {
    const container = document.getElementById("detailsContainer");

    if (!postId) {
        container.innerHTML = "<p>No property selected.</p>";
        return;
    }

    const snap = await get(ref(database, "posts/" + postId));

    if (!snap.exists()) {
        container.innerHTML = "<p>Property not found.</p>";
        return;
    }

    const post = snap.val();
    currentPost = post;

    await countUniqueView(post);

    const images = Array.isArray(post.imageURLs) && post.imageURLs.length > 0
        ? post.imageURLs
        : [post.imageURL || "https://images.unsplash.com/photo-1564013799919-ab600027ffc6"];

    const mainImage = images[0];
    const phone = cleanPhone(post.contactPhone || "");
    const whatsapp = cleanPhone(post.whatsappNumber || post.contactPhone || "");
    const email = post.contactEmail || post.ownerEmail || "";
    const locationQuery = encodeURIComponent(post.location || "");
    const mapsLink = "https://www.google.com/maps/search/?api=1&query=" + locationQuery;

    const whatsappText = encodeURIComponent(`Hello, I saw your property on QEJA: ${post.title}. Is it still available?`);
    const whatsappLink = whatsapp ? `https://wa.me/${whatsapp}?text=${whatsappText}` : "#";
    const ownerPhoto = post.ownerPhoto || "https://i.pravatar.cc/150?u=" + (post.ownerId || "qeja");

    container.innerHTML = `
        <div class="details-card">
            <img id="mainPropertyImage" class="main-img" src="${mainImage}" onerror="this.src='https://images.unsplash.com/photo-1564013799919-ab600027ffc6'">

            <div class="details-info">
                ${images.length > 1 ? `
                    <div class="gallery-strip">
                        ${images.map((img, index) => `
                            <img src="${img}" class="${index === 0 ? "active" : ""}" onclick="changeMainImage('${img}', this)">
                        `).join("")}
                    </div>
                ` : ""}

                <h1>${post.title || "Property Listing"}</h1>
                <div class="price">${post.price || ""}</div>

                <p><strong>Location:</strong> ${post.location || "Not added"}</p>
                <p><strong>Category:</strong> ${post.category || "Property"}</p>
                <p><strong>Type:</strong> ${post.type || "Property Post"}</p>
                <p>${post.description || ""}</p>

                <p>
                    Views: ${displayViews} |
                    Likes: ${post.likesCount || post.likes || 0} |
                    Inquiries: ${post.inquiries || 0}
                </p>

                <div class="action-row">
                    <a class="green" href="${whatsappLink}" target="_blank">WhatsApp</a>
                    <a class="orange" href="${phone ? "tel:+" + phone : "#"}">Call</a>
                    <a class="blue" href="${email ? "mailto:" + email : "#"}">Email</a>
                    <a class="dark" href="${mapsLink}" target="_blank">Open Location</a>
                    <button class="dark" onclick="toggleSaveProperty('${post.postId}')">Save Property</button>
                    <button class="orange" onclick="sendInquiry('${post.postId}', '${post.ownerId}')">Send Inquiry</button>
                </div>

                <div class="owner-box">
                    <img src="${ownerPhoto}" onerror="this.src='https://i.pravatar.cc/150'">

                    <div class="owner-info">
                        <h3>Owner / Agent</h3>
                        <a href="user.html?id=${post.ownerId}">
                            ${post.contactName || post.ownerName || "QEJA User"}
                        </a>
                        <p>${post.contactPhone || "Phone not added"} · ${email || "Email not added"}</p>

                        <div class="owner-actions">
                            <a class="dark" href="user.html?id=${post.ownerId}">View Profile</a>
                            <button class="orange" onclick="startMessage('${post.ownerId}')">Message</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    `;
}

window.changeMainImage = function(imageUrl, el) {
    document.getElementById("mainPropertyImage").src = imageUrl;

    document.querySelectorAll(".gallery-strip img").forEach(img => {
        img.classList.remove("active");
    });

    el.classList.add("active");
};

window.sendInquiry = async function(postId, ownerId) {
    if (!ownerId) {
        alert("Owner not found.");
        return;
    }

    const leadRef = push(ref(database, "leads/" + ownerId));

    await set(leadRef, {
        leadId: leadRef.key,
        postId,
        interestedUserId: currentUser.uid,
        interestedUserName: currentUserData.fullName || "QEJA User",
        interestedUserEmail: currentUser.email,
        createdAt: new Date().toISOString(),
        status: "new"
    });

    const postSnap = await get(ref(database, "posts/" + postId));
    if (postSnap.exists()) {
        const post = postSnap.val();
        await update(ref(database, "posts/" + postId), {
            inquiries: (post.inquiries || 0) + 1
        });
    }

    alert("Inquiry sent successfully.");
};

window.toggleSaveProperty = async function(postId) {
    const saveRef = ref(database, `savedProperties/${currentUser.uid}/${postId}`);
    const snap = await get(saveRef);

    if (snap.exists()) {
        await remove(saveRef);
        alert("Property removed from saved.");
    } else {
        const postSnap = await get(ref(database, "posts/" + postId));

        if (postSnap.exists()) {
            await set(saveRef, postSnap.val());
            alert("Property saved successfully.");
        }
    }
};

window.startMessage = function(ownerId) {
    if (!ownerId) {
        alert("Owner not found.");
        return;
    }

    if (ownerId === currentUser.uid) {
        alert("You cannot message yourself.");
        return;
    }

    window.location.href = `chat.html?user=${ownerId}`;
};
</script>

</body>
</html>
