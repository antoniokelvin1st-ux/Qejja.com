<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Explore - Qejja</title>
<link rel="stylesheet" href="style.css">

<style>
body{padding-bottom:80px;background:#f4f4f4;}
.top-appbar{background:#111;color:white;padding:18px 7%;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;}
.explore-wrap{padding:30px 7%;max-width:1000px;margin:auto;}
.search-panel{background:white;padding:20px;border-radius:18px;box-shadow:0 8px 20px rgba(0,0,0,.08);margin-bottom:25px;}
.search-panel input,.search-panel select{width:100%;padding:14px;margin:8px 0;border-radius:10px;border:1px solid #ddd;}
.filter-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.result-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:20px;}
.result-card{background:white;border-radius:18px;overflow:hidden;box-shadow:0 8px 20px rgba(0,0,0,.08);}
.result-card img{width:100%;height:220px;object-fit:cover;background:#eee;}
.result-info{padding:18px;}
.result-info h3{margin-bottom:8px;}
.price{color:#ff7a18;font-weight:bold;margin:8px 0;}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:white;border-top:1px solid #ddd;height:70px;display:flex;justify-content:space-around;align-items:center;z-index:200;}
.bottom-nav a{text-decoration:none;color:#555;font-size:13px;font-weight:bold;text-align:center;}
.bottom-nav span{display:block;font-size:23px;}
.post-plus{background:#111;color:white!important;width:58px;height:58px;border-radius:18px;display:flex;align-items:center;justify-content:center;margin-top:-28px;border:4px solid #ff7a18;}
.post-plus span{font-size:34px;}
@media(max-width:700px){.filter-row{grid-template-columns:1fr;}}
</style>
</head>

<body>

<header class="top-appbar">
    <div class="logo">Qejja</div>
    <a href="settings.html" style="color:white;text-decoration:none;font-weight:bold;">⚙ Settings</a>
</header>

<main class="explore-wrap">
    <h1>Explore</h1>
    <p style="margin-bottom:20px;">Search houses, rentals, apartments, plots and property reels.</p>

    <div class="search-panel">
        <input id="searchInput" type="text" placeholder="Search by title, location, price, owner...">

        <div class="filter-row">
            <select id="categoryFilter">
                <option value="">All Categories</option>
                <option value="Rental">Rental</option>
                <option value="Apartment">Apartment</option>
                <option value="House">House</option>
                <option value="Land">Land / Plot</option>
                <option value="Commercial">Commercial</option>
                <option value="Airbnb">Airbnb</option>
            </select>

            <select id="sortFilter">
                <option value="latest">Latest</option>
                <option value="likes">Most Liked</option>
                <option value="views">Most Viewed</option>
            </select>
        </div>

        <button id="searchBtn" style="margin-top:10px;background:#ff7a18;color:white;border:none;padding:12px 25px;border-radius:30px;font-weight:bold;cursor:pointer;">
            Search
        </button>
    </div>

    <h2>Results</h2>
    <div id="resultsContainer" class="result-grid" style="margin-top:20px;">Loading...</div>
</main>

<nav class="bottom-nav">
    <a href="index.html"><span>🏠</span>Home</a>
    <a href="explore.html"><span>🔍</span>Explore</a>
    <a href="post.html" class="post-plus"><span>+</span></a>
    <a href="inbox.html"><span>💬</span>Inbox</a>
    <a href="profile.html"><span>👤</span>Profile</a>
</nav>

<script type="module">
import { auth, database } from "./firebase.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.4.0/firebase-auth.js";
import { ref, onValue } from "https://www.gstatic.com/firebasejs/12.4.0/firebase-database.js";

let allPosts = [];

onAuthStateChanged(auth, (user) => {
    if (!user) {
        window.location.href = "login.html";
        return;
    }

    loadExplorePosts();
});

function loadExplorePosts() {
    onValue(ref(database, "posts"), (snapshot) => {
        allPosts = [];

        if (snapshot.exists()) {
            snapshot.forEach(child => {
                allPosts.push(child.val());
            });
        }

        renderResults();
    });
}

function renderResults() {
    const container = document.getElementById("resultsContainer");
    const search = document.getElementById("searchInput").value.toLowerCase().trim();
    const category = document.getElementById("categoryFilter").value;
    const sort = document.getElementById("sortFilter").value;

    let filtered = allPosts.filter(post => {
        const text = `
            ${post.title || ""}
            ${post.location || ""}
            ${post.price || ""}
            ${post.ownerName || ""}
            ${post.description || ""}
        `.toLowerCase();

        const matchesSearch = !search || text.includes(search);
        const matchesCategory = !category || post.category === category;

        return matchesSearch && matchesCategory;
    });

    if (sort === "likes") {
        filtered.sort((a,b) => (b.likesCount || b.likes || 0) - (a.likesCount || a.likes || 0));
    } else if (sort === "views") {
        filtered.sort((a,b) => (b.views || 0) - (a.views || 0));
    } else {
        filtered.sort((a,b) => new Date(b.createdAt || 0) - new Date(a.createdAt || 0));
    }

    container.innerHTML = "";

    if (filtered.length === 0) {
        container.innerHTML = "<p>No matching properties found.</p>";
        return;
    }

    filtered.forEach(post => {
        const image = post.imageURL || "https://images.unsplash.com/photo-1564013799919-ab600027ffc6";

        const card = document.createElement("div");
        card.className = "result-card";

        card.innerHTML = `
            <img src="${image}" onerror="this.src='https://images.unsplash.com/photo-1564013799919-ab600027ffc6'">
            <div class="result-info">
                <h3>${post.title || "Property Listing"}</h3>
                <p>${post.location || "Location not added"}</p>
                <div class="price">${post.price || ""}</div>
                <p>${post.description || ""}</p>
                <small>By @${post.ownerName || "Qejja User"}</small><br><br>
                <a href="details.html?id=${post.postId}" style="color:#ff7a18;font-weight:bold;text-decoration:none;">View Property</a>
            </div>
        `;

        container.appendChild(card);
    });
}

document.getElementById("searchBtn").addEventListener("click", renderResults);
document.getElementById("searchInput").addEventListener("input", renderResults);
document.getElementById("categoryFilter").addEventListener("change", renderResults);
document.getElementById("sortFilter").addEventListener("change", renderResults);
</script>

</body>
</html>
