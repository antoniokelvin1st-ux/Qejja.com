<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Discover Properties - QEJA</title>
<meta name="description" content="Discover rentals, houses, apartments, land, hostels, Airbnb listings and property reels on QEJA.">
<link rel="canonical" href="https://qeja.com.ng/discover.html">
<link rel="icon" type="image/png" href="favicon.png">
<link rel="stylesheet" href="style.css">

<style>
body{padding-bottom:90px;background:#f4f4f4;}
.top-appbar{background:#111;color:white;padding:18px 7%;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;}
.logo{font-size:30px;font-weight:900;color:#ff7a18;}
.discover-wrap{padding:30px 7% 110px;max-width:1200px;margin:auto;}
.hero-box{background:linear-gradient(135deg,#111,#2a2a2a);color:white;border-radius:24px;padding:28px;margin-bottom:24px;}
.hero-box h1{font-size:38px;margin-bottom:8px;}
.search-panel{background:white;padding:18px;border-radius:20px;box-shadow:0 8px 20px rgba(0,0,0,.08);margin-bottom:25px;}
.search-panel input,.search-panel select{width:100%;padding:14px;margin:8px 0;border-radius:12px;border:1px solid #ddd;box-sizing:border-box;}
.filter-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
.quick-tabs{display:flex;gap:10px;flex-wrap:wrap;margin:18px 0;}
.quick-tabs button{border:none;background:white;padding:10px 18px;border-radius:24px;font-weight:bold;cursor:pointer;box-shadow:0 5px 12px rgba(0,0,0,.06);}
.quick-tabs button.active{background:#ff7a18;color:white;}
.section-title{margin:25px 0 15px;font-size:26px;}
.result-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:22px;}
.result-card{background:white;border-radius:20px;overflow:hidden;box-shadow:0 10px 25px rgba(0,0,0,.08);}
.result-card img{width:100%;height:230px;object-fit:cover;background:#eee;display:block;}
.result-info{padding:18px;}
.result-info h3{font-size:22px;margin-bottom:6px;}
.price{color:#ff7a18;font-weight:900;margin:8px 0;font-size:20px;}
.meta-row{display:flex;justify-content:space-between;gap:10px;color:#555;font-weight:bold;margin:10px 0;flex-wrap:wrap;}
.owner-link{display:inline-flex;align-items:center;gap:8px;text-decoration:none;color:#111;font-weight:bold;margin-top:10px;}
.owner-avatar{
    width:34px!important;
    height:34px!important;
    min-width:34px!important;
    max-width:34px!important;
    border-radius:50%;
    object-fit:cover;
    border:2px solid #ff7a18;
    background:#eee;
    display:inline-block!important;
}
.view-link{color:#ff7a18;font-weight:900;text-decoration:none;display:inline-block;margin-top:12px;font-size:17px;}
.badge{display:inline-block;background:#fff1e8;color:#ff7a18;padding:5px 10px;border-radius:20px;font-size:12px;font-weight:bold;margin-bottom:8px;}
.empty-box{background:white;border-radius:18px;padding:25px;text-align:center;color:#555;}

.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#111;border-top:1px solid rgba(255,255,255,.08);height:74px;display:flex;justify-content:space-around;align-items:center;z-index:200;box-shadow:0 -8px 25px rgba(0,0,0,.25);}
.bottom-nav a{text-decoration:none;color:#ddd;font-size:12px;font-weight:bold;text-align:center;}
.bottom-nav span{display:block;font-size:24px;margin-bottom:2px;}
.bottom-nav a:hover{color:#ff7a18;}
.post-plus{background:#ff7a18;color:white!important;width:62px;height:62px;border-radius:22px;display:flex;align-items:center;justify-content:center;margin-top:-34px;border:5px solid #111;box-shadow:0 0 18px rgba(255,122,24,.7);animation:qejaPulse 1.8s infinite;}
.post-plus span{font-size:34px;}
@keyframes qejaPulse{0%{transform:scale(1);}50%{transform:scale(1.08);}100%{transform:scale(1);}}

@media(max-width:750px){
    .filter-row{grid-template-columns:1fr;}
    .hero-box h1{font-size:30px;}
}
</style>
</head>

<body>

<header class="top-appbar">
    <div class="logo">QEJA</div>
    <a href="settings.html" style="color:white;text-decoration:none;font-weight:bold;">⚙ Settings</a>
</header>

<main class="discover-wrap">

    <section class="hero-box">
        <h1>Discover</h1>
        <p>Find rentals, houses, hostels, land, Airbnb spaces, agents and property reels.</p>
    </section>

    <div class="search-panel">
        <input id="searchInput" type="text" placeholder="Search by title, location, owner, price...">

        <div class="filter-row">
            <select id="categoryFilter">
                <option value="">All Categories</option>
                <option value="Rental">Rental</option>
                <option value="Apartment">Apartment</option>
                <option value="House">House</option>
                <option value="Land">Land / Plot</option>
                <option value="Commercial">Commercial</option>
                <option value="Hostel">Hostel</option>
                <option value="Airbnb">Airbnb</option>
                <option value="Office">Office</option>
            </select>

            <select id="typeFilter">
                <option value="">All Types</option>
                <option value="Property">Property Posts</option>
                <option value="Reel">Reels</option>
                <option value="Featured">Featured</option>
            </select>

            <select id="sortFilter">
                <option value="latest">Latest</option>
                <option value="likes">Most Liked</option>
                <option value="views">Most Viewed</option>
                <option value="inquiries">Most Inquiries</option>
            </select>
        </div>
    </div>

    <div class="quick-tabs">
        <button class="active" onclick="setQuickFilter('all', this)">All</button>
        <button onclick="setQuickFilter('featured', this)">Featured</button>
        <button onclick="setQuickFilter('trending', this)">Trending</button>
        <button onclick="setQuickFilter('reels', this)">Reels</button>
        <button onclick="setQuickFilter('latest', this)">Latest</button>
    </div>

    <h2 id="sectionTitle" class="section-title">All Discoveries</h2>
    <div id="resultsContainer" class="result-grid">Loading...</div>

</main>

<nav class="bottom-nav">
    <a href="index.html"><span>⌂</span>Home</a>
    <a href="discover.html"><span>🧭</span>Discover</a>
    <a href="post.html" class="post-plus"><span>＋</span></a>
    <a href="inbox.html"><span>🔔</span>Activity</a>
    <a href="profile.html"><span>◎</span>Profile</a>
</nav>

<script type="module">
import { auth, database } from "./firebase.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

let allPosts = [];
let quickFilter = "all";

let currentUser = null;

onAuthStateChanged(auth, (user) => {
    if (!user) {
        window.location.href = "login.html";
        return;
    }
    currentUser = user;
    loadDiscoverPosts();
});

function safeText(value, fallback = "") {
    return value ? String(value) : fallback;
}

function loadDiscoverPosts() {
    onValue(ref(database, "posts"), (snapshot) => {
        allPosts = [];

        if (snapshot.exists()) {
            snapshot.forEach(child => {
                const post = child.val() || {};
                post.realPostId = post.postId || child.key;
                allPosts.push(post);
            });
        }

        renderResults();
    });
}

function renderResults() {
    const container = document.getElementById("resultsContainer");
    const title = document.getElementById("sectionTitle");

    const search = document.getElementById("searchInput").value.toLowerCase().trim();
    const category = document.getElementById("categoryFilter").value;
    const type = document.getElementById("typeFilter").value;
    const sort = document.getElementById("sortFilter").value;

    let filtered = allPosts.filter(post => {
        if (post.status === "draft" || post.visibility === "draft") return false;

        const text = `
            ${post.title || ""}
            ${post.location || ""}
            ${post.price || ""}
            ${post.ownerName || ""}
            ${post.description || ""}
            ${post.category || ""}
        `.toLowerCase();

        const matchesSearch = !search || text.includes(search);
        const matchesCategory = !category || post.category === category;
        const matchesType = !type || post.type === type || (type === "Reel" && post.videoURL);

        return matchesSearch && matchesCategory && matchesType;
    });

    if (quickFilter === "featured") {
        filtered = filtered.filter(post => post.isFeatured === true || post.type === "Featured" || post.featuredStatus === "active");
        title.textContent = "Featured Properties";
    } else if (quickFilter === "trending") {
        filtered = filtered.filter(post => (post.views || 0) >= 1 || (post.likesCount || post.likes || 0) >= 1);
        filtered.sort((a,b) => ((b.views || 0) + (b.likesCount || b.likes || 0)) - ((a.views || 0) + (a.likesCount || a.likes || 0)));
        title.textContent = "Trending Now";
    } else if (quickFilter === "reels") {
        filtered = filtered.filter(post => post.videoURL || post.type === "Reel");
        title.textContent = "Property Reels";
    } else if (quickFilter === "latest") {
        filtered.sort((a,b) => new Date(b.createdAt || 0) - new Date(a.createdAt || 0));
        title.textContent = "Latest Posts";
    } else {
        title.textContent = "All Discoveries";
    }

    if (sort === "likes") {
        filtered.sort((a,b) => (b.likesCount || b.likes || 0) - (a.likesCount || a.likes || 0));
    } else if (sort === "views") {
        filtered.sort((a,b) => (b.views || 0) - (a.views || 0));
    } else if (sort === "inquiries") {
        filtered.sort((a,b) => (b.inquiries || 0) - (a.inquiries || 0));
    } else if (quickFilter !== "trending") {
        filtered.sort((a,b) => new Date(b.createdAt || 0) - new Date(a.createdAt || 0));
    }

    container.innerHTML = "";

    if (filtered.length === 0) {
        container.innerHTML = "<div class='empty-box'>No matching properties found.</div>";
        return;
    }

    filtered.forEach(post => {
        const postId = post.realPostId;
        const ownerId = post.ownerId || "";
        const image = post.imageURL || (post.imageURLs && post.imageURLs[0]) || "https://images.unsplash.com/photo-1564013799919-ab600027ffc6";
        const ownerPhoto = post.ownerPhoto || "https://i.pravatar.cc/100?u=" + (ownerId || "qeja");
        const ownerLink = ownerId
    ? (currentUser && ownerId === currentUser.uid ? "profile.html" : `user.html?id=${ownerId}`)
    : "#";

        const card = document.createElement("div");
        card.className = "result-card";

        const badge = post.isFeatured || post.type === "Featured" || post.featuredStatus === "active"
            ? "<span class='badge'>Featured</span>"
            : post.videoURL
                ? "<span class='badge'>Reel</span>"
                : `<span class='badge'>${safeText(post.category, "Property")}</span>`;

        card.innerHTML = `
            <a href="details.html?id=${post.realPostId}">>
                <img src="${image}" onerror="this.src='https://images.unsplash.com/photo-1564013799919-ab600027ffc6'">
            </a>

            <div class="result-info">
                ${badge}

                <h3>${safeText(post.title, "Property Listing")}</h3>
                <p>${safeText(post.location, "Location not added")}</p>
                <div class="price">${safeText(post.price, "")}</div>
                <p>${safeText(post.description, "")}</p>

                <div class="meta-row">
                    <span>◉ ${post.views || 0} views</span>
                    <span>♥ ${post.likesCount || post.likes || 0} likes</span>
                    <span>📩 ${post.inquiries || 0}</span>
                </div>

                <a href="${ownerLink}" class="owner-link">
                    <img src="${ownerPhoto}" class="owner-avatar" onerror="this.src='https://i.pravatar.cc/100'">
                    <span>@${safeText(post.ownerName, "QEJA User")}</span>
                </a>

                <br>
                <a class="view-link" href="details.html?id=${post.realPostId}">View Property</a>
            </div>
        `;

        container.appendChild(card);
    });
}

window.setQuickFilter = function(filter, button) {
    quickFilter = filter;

    document.querySelectorAll(".quick-tabs button").forEach(btn => {
        btn.classList.remove("active");
    });

    button.classList.add("active");
    renderResults();
};

document.getElementById("searchInput").addEventListener("input", renderResults);
document.getElementById("categoryFilter").addEventListener("change", renderResults);
document.getElementById("typeFilter").addEventListener("change", renderResults);
document.getElementById("sortFilter").addEventListener("change", renderResults);
</script>

</body>
</html>
