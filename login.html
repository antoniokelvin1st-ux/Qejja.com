<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - qeja</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">
    <div class="logo">qeja</div>
    <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="property.html">Properties</a></li>
        <li><a href="reels.html">Reels</a></li>
        <li><a href="messages.html">Messages</a></li>
        <li><a href="profile.html">Profile</a></li>
    </ul>
    <a href="signup.html" class="login-btn">Sign Up</a>
</nav>

<section style="padding:130px 7% 70px; min-height:80vh;">
    <div class="property-card" style="max-width:450px;margin:auto;">
        <div class="property-info">
            <h2 style="text-align:center;margin-bottom:20px;">Login</h2>

            <input id="email" type="email" placeholder="Email address" style="width:100%;padding:14px;margin-bottom:15px;border-radius:8px;border:1px solid #ddd;">
            <input id="password" type="password" placeholder="Password" style="width:100%;padding:14px;margin-bottom:20px;border-radius:8px;border:1px solid #ddd;">

            <button id="loginBtn" style="width:100%;background:#ff7a18;color:white;border:none;padding:14px;border-radius:30px;cursor:pointer;">
                Login
            </button>

            <p style="text-align:center;margin-top:20px;">
                Don't have an account?
                <a href="signup.html" style="color:#ff7a18;">Create one</a>
            </p>
        </div>
    </div>
</section>

<footer>
    <p>&copy; 2026 qeja.com. All rights reserved.</p>
</footer>

<script type="module">
import { auth } from "./firebase.js";
import { signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.4.0/firebase-auth.js";

document.getElementById("loginBtn").addEventListener("click", async () => {
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;

    if (!email || !password) {
        alert("Please enter email and password");
        return;
    }

    try {
        await signInWithEmailAndPassword(auth, email, password);
        alert("Login successful!");
        window.location.href = "profile.html";
    } catch (error) {
        alert(error.message);
    }
});
</script>

</body>
</html>
