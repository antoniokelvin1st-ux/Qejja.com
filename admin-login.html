<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login - qeja</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<section style="padding:100px 7%;min-height:100vh;display:flex;justify-content:center;align-items:center;background:#f5f5f5;">

    <div class="property-card" style="max-width:450px;width:100%;">
        <div class="property-info">

            <h2 style="text-align:center;">Admin Portal</h2>
            <p style="text-align:center;margin-bottom:25px;">
                Authorized Administrators Only
            </p>

            <input
                type="email"
                id="adminEmail"
                placeholder="Admin Email"
                style="width:100%;padding:14px;margin-bottom:15px;border-radius:8px;border:1px solid #ddd;">

            <input
                type="password"
                id="adminPassword"
                placeholder="Password"
                style="width:100%;padding:14px;margin-bottom:20px;border-radius:8px;border:1px solid #ddd;">

            <button
                onclick="adminLogin()"
                style="width:100%;background:#ff7a18;color:white;border:none;padding:14px;border-radius:30px;cursor:pointer;">
                Login
            </button>

        </div>
    </div>

</section>

<script>
function adminLogin() {

    const email = document.getElementById("adminEmail").value;
    const password = document.getElementById("adminPassword").value;

    if(email === "admin@qeja.com" && password === "admin123"){
        window.location.href = "admin-dashboard.html";
    } else {
        alert("Invalid Admin Credentials");
    }

}
</script>

</body>
</html>
