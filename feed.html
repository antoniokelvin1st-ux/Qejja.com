<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feed - qeja</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">
    <div class="logo">qeja</div>

    <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="feed.html">Feed</a></li>
        <li><a href="property.html">Properties</a></li>
        <li><a href="reels.html">Reels</a></li>
        <li><a href="profile.html">Profile</a></li>
        <li><a href="settings.html">Settings</a></li>
    </ul>

    <button id="logoutBtn" class="login-btn" style="border:none;cursor:pointer;">Logout</button>
</nav>

<section style="padding:120px 7% 60px;">
    <h2>qeja Property Feed</h2>
    <p style="margin-bottom:30px;">Post property images, reels, rentals, plots and houses.</p>

    <div class="property-card" style="max-width:700px;margin-bottom:40px;">
        <div class="property-info">
            <h3>Create New Post</h3>

            <input id="postTitle" type="text" placeholder="Property title" style="width:100%;padding:14px;margin:8px 0;">
            <input id="postLocation" type="text" placeholder="Location" style="width:100%;padding:14px;margin:8px 0;">
            <input id="postPrice" type="text" placeholder="Price" style="width:100%;padding:14px;margin:8px 0;">
            <input id="postImage" type="text" placeholder="Image URL" style="width:100%;padding:14px;margin:8px 0;">
            <input id="postVideo" type="text" placeholder="Video/Reel URL optional" style="width:100%;padding:14px;margin:8px 0;">
            <textarea id="postDescription" placeholder="Description" style="width:100%;height:100px;padding:14px;margin:8px 0;"></textarea>

            <button id="createPostBtn" style="background:#ff7a18;color:white;border:none;padding:12px 25px;border-radius:30px;cursor:pointer;">
                Post Property
            </button>
        </div>
    </div>

    <h2>Latest Posts</h2>
    <div id="feedContainer" class="property-grid" style="margin-top:30px;"></div>
</section>

<footer>
    <p>&copy; 2026 qeja.com. All rights reserved.</p>
</footer>

<script type="module">
import { auth, database } from "./firebase.js";
import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.4.0/firebase-auth.js";
import { ref, push, set, get, onValue, remove, update } from "https://www.gstatic.com/firebasejs/12.4.0/firebase-database.js";

let currentUser = null;
let currentUserData = null;

onAuthStateChanged(auth, async (user) => {
    if (!user) {
        window.location.href = "login.html";
        return;
    }

    currentUser = user;

    const userSnap = await get(ref(database, "users/" + user.uid));
    currentUserData = userSnap.exists() ? userSnap.val() : {
        fullName: "qeja User",
        email: user.email
    };

    loadFeed();
});

document.getElementById("createPostBtn").addEventListener("click", async () => {
    if (!currentUser) return;

    const title = document.getElementById("postTitle").value.trim();
    const location = document.getElementById("postLocation").value.trim();
    const price = document.getElementById("postPrice").value.trim();
    const imageURL = document.getElementById("postImage").value.trim();
    const videoURL = document.getElementById("postVideo").value.trim();
    const description = document.getElementById("postDescription").value.trim();

    if (!title || !location || !price || !imageURL || !description) {
        alert("Please fill title, location, price, image URL and description");
        return;
    }

    const postRef = push(ref(database, "posts"));

    await set(postRef, {
        postId: postRef.key,
        ownerId: currentUser.uid,
        ownerName: currentUserData.fullName || "qeja User",
        ownerEmail: currentUser.email,
        title,
        location,
        price,
        imageURL,
        videoURL,
        description,
        likes: 0,
        views: 0,
        saves: 0,
        createdAt: new Date().toISOString()
    });

    alert("Property posted successfully!");

    document.getElementById("postTitle").value = "";
    document.getElementById("postLocation").value = "";
    document.getElementById("postPrice").value = "";
    document.getElementById("postImage").value = "";
    document.getElementById("postVideo").value = "";
    document.getElementById("postDescription").value = "";
});

function loadFeed() {
    const feedContainer = document.getElementById("feedContainer");

    onValue(ref(database, "posts"), (snapshot) => {
        feedContainer.innerHTML = "";

        if (!snapshot.exists()) {
            feedContainer.innerHTML = "<p>No posts yet. Create the first listing.</p>";
            return;
        }

        const posts = [];
        snapshot.forEach((child) => {
            posts.push(child.val());
        });

        posts.reverse().forEach((post) => {
            const card = document.createElement("div");
            card.className = "property-card";

            const deleteButton = post.ownerId === currentUser.uid
                ? `<button onclick="deletePost('${post.postId}')" style="background:#cc0000;color:white;border:none;padding:9px 14px;border-radius:20px;cursor:pointer;margin-top:10px;">Delete</button>`
                : "";

            card.innerHTML = `
                <img src="${post.imageURL}" alt="${post.title}">
                <div class="property-info">
                    <h3>${post.title}</h3>
                    <p><strong>Owner:</strong> ${post.ownerName}</p>
                    <p><strong>Location:</strong> ${post.location}</p>
                    <h4>${post.price}</h4>
                    <p>${post.description}</p>

                    ${post.videoURL ? `<a href="${post.videoURL}" target="_blank">Watch Reel</a><br><br>` : ""}

                    <p>👁 Views: ${post.views || 0} &nbsp; ❤️ Likes: ${post.likes || 0} &nbsp; 🔖 Saves: ${post.saves || 0}</p>

                    <button onclick="likePost('${post.postId}', ${post.likes || 0})" style="background:#ff7a18;color:white;border:none;padding:9px 14px;border-radius:20px;cursor:pointer;">Like</button>

                    <button onclick="showComments('${post.postId}')" style="background:#111;color:white;border:none;padding:9px 14px;border-radius:20px;cursor:pointer;">Comments</button>

                    ${deleteButton}

                    <div id="comments-${post.postId}" style="display:none;margin-top:15px;">
                        <input id="commentInput-${post.postId}" type="text" placeholder="Write a comment..." style="width:100%;padding:10px;margin:8px 0;">
                        <button onclick="addComment('${post.postId}')" style="background:#ff7a18;color:white;border:none;padding:8px 14px;border-radius:20px;">Post Comment</button>
                        <div id="commentList-${post.postId}" style="margin-top:12px;"></div>
                    </div>
                </div>
            `;

            feedContainer.appendChild(card);
        });
    });
}

window.likePost = async function(postId, currentLikes) {
    await update(ref(database, "posts/" + postId), {
        likes: currentLikes + 1
    });
};

window.deletePost = async function(postId) {
    if (confirm("Delete this post?")) {
        await remove(ref(database, "posts/" + postId));
        alert("Post deleted");
    }
};

window.showComments = function(postId) {
    const box = document.getElementById("comments-" + postId);
    box.style.display = box.style.display === "none" ? "block" : "none";

    const commentList = document.getElementById("commentList-" + postId);

    onValue(ref(database, "comments/" + postId), (snapshot) => {
        commentList.innerHTML = "";

        if (!snapshot.exists()) {
            commentList.innerHTML = "<p>No comments yet.</p>";
            return;
        }

        snapshot.forEach((child) => {
            const comment = child.val();

            const item = document.createElement("div");
            item.style.marginTop = "10px";
            item.style.padding = "10px";
            item.style.background = "#f3f3f3";
            item.style.borderRadius = "10px";

            item.innerHTML = `
                <strong>${comment.userName}</strong>
                <p>${comment.text}</p>
            `;

            commentList.appendChild(item);
        });
    });
};

window.addComment = async function(postId) {
    const input = document.getElementById("commentInput-" + postId);
    const text = input.value.trim();

    if (!text) {
        alert("Write a comment first");
        return;
    }

    const commentRef = push(ref(database, "comments/" + postId));

    await set(commentRef, {
        commentId: commentRef.key,
        userId: currentUser.uid,
        userName: currentUserData.fullName || "qeja User",
        text,
        createdAt: new Date().toISOString()
    });

    input.value = "";
};

document.getElementById("logoutBtn").addEventListener("click", async () => {
    await signOut(auth);
    window.location.href = "login.html";
});
</script>

</body>
</html>
