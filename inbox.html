<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" type="image/png" href="favicon.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Activity - QEJA</title>
<link rel="stylesheet" href="style.css">

<style>
body{padding-bottom:90px;background:#f4f4f4;}
.top-appbar{background:#111;color:white;padding:18px 7%;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;}
.logo{font-size:30px;font-weight:900;color:#ff7a18;}
.inbox-wrap{padding:30px 7% 100px;max-width:950px;margin:auto;}
.hero-card{background:#111;color:white;border-radius:24px;padding:24px;box-shadow:0 10px 25px rgba(0,0,0,.18);margin-bottom:22px;}
.hero-card h1{font-size:34px;margin-bottom:8px;}
.hero-card p{color:#ddd;}
.tabs{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:20px 0;}
.tab-btn{border:none;padding:14px 12px;border-radius:18px;background:white;font-weight:bold;cursor:pointer;box-shadow:0 6px 16px rgba(0,0,0,.07);}
.tab-btn.active{background:#ff7a18;color:white;}
.badge{background:#111;color:white;padding:3px 9px;border-radius:20px;font-size:12px;margin-left:4px;display:none;}
.tab-btn.active .badge{background:white;color:#ff7a18;}
.section-title{margin:18px 0 12px;}
.group-card,.activity-card,.chat-card{background:white;border-radius:20px;padding:16px;box-shadow:0 8px 20px rgba(0,0,0,.08);margin-bottom:14px;}
.group-card{cursor:pointer;}
.group-head{display:flex;align-items:center;gap:12px;}
.activity-icon{width:44px;height:44px;border-radius:16px;background:#fff3e8;color:#ff7a18;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:bold;flex-shrink:0;}
.group-info{flex:1;}
.group-info h3{font-size:18px;margin-bottom:4px;}
.group-info p{color:#555;font-size:14px;}
.group-count{background:#ff7a18;color:white;padding:5px 10px;border-radius:20px;font-size:12px;font-weight:bold;}
.group-details{display:none;margin-top:14px;border-top:1px solid #eee;padding-top:12px;}
.activity-card{display:flex;gap:12px;align-items:flex-start;}
.activity-body{flex:1;}
.activity-body h3{font-size:17px;margin-bottom:5px;}
.activity-body p{color:#555;margin-bottom:6px;}
.activity-meta{font-size:12px;color:#888;}
.small-btn{border:none;padding:8px 14px;border-radius:20px;cursor:pointer;font-weight:bold;margin-top:8px;margin-right:6px;}
.orange-btn{background:#ff7a18;color:white;}
.dark-btn{background:#111;color:white;}
.empty{background:white;border-radius:20px;padding:20px;box-shadow:0 8px 20px rgba(0,0,0,.08);color:#555;}
.chat-card{display:flex;align-items:center;gap:12px;}
.chat-avatar{width:52px;height:52px;border-radius:50%;object-fit:cover;background:#eee;border:2px solid #ff7a18;}
.chat-info{flex:1;}
.chat-info h3{font-size:17px;margin-bottom:4px;}
.chat-info p{color:#555;font-size:14px;}
.unread-dot{width:11px;height:11px;border-radius:50%;background:#ff7a18;flex-shrink:0;}
.nav-activity{position:relative;}
.activity-nav-badge{position:absolute;top:-6px;right:8px;background:red;color:white;min-width:18px;height:18px;border-radius:50%;font-size:11px;display:none;align-items:center;justify-content:center;padding:2px;font-weight:bold;}

.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#111;border-top:1px solid rgba(255,255,255,.08);height:74px;display:flex;justify-content:space-around;align-items:center;z-index:200;box-shadow:0 -8px 25px rgba(0,0,0,.25);}
.bottom-nav a{text-decoration:none;color:#ddd;font-size:12px;font-weight:bold;text-align:center;position:relative;}
.bottom-nav span{display:block;font-size:24px;margin-bottom:2px;}
.bottom-nav a:hover{color:#ff7a18;}
.post-plus{background:#ff7a18;color:white!important;width:62px;height:62px;border-radius:22px;display:flex;align-items:center;justify-content:center;margin-top:-34px;border:5px solid #111;box-shadow:0 0 18px rgba(255,122,24,.7);animation:qejaPulse 1.8s infinite;}
.post-plus span{font-size:34px;}
@keyframes qejaPulse{0%{transform:scale(1);}50%{transform:scale(1.08);}100%{transform:scale(1);}}
@media(max-width:700px){.tabs{grid-template-columns:1fr;}.hero-card h1{font-size:28px;}}
</style>
</head>

<body>

<header class="top-appbar">
    <div class="logo">QEJA</div>
    <a href="settings.html" style="color:white;text-decoration:none;font-weight:bold;">⚙ Settings</a>
</header>

<main class="inbox-wrap">
    <div class="hero-card">
        <h1>Activity</h1>
        <p>Notifications, messages, and property inquiries in one clean place.</p>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="showTab('notifications')">
            🔔 Notifications <span id="notificationCount" class="badge">0</span>
        </button>
        <button class="tab-btn" onclick="showTab('messages')">
            💬 Messages <span id="messageCount" class="badge">0</span>
        </button>
        <button class="tab-btn" onclick="showTab('inquiries')">
            📩 Inquiries <span id="inquiryCount" class="badge">0</span>
        </button>
    </div>

    <section id="notificationsTab">
        <h2 class="section-title">Notifications</h2>
        <div id="notificationsContainer">Loading notifications...</div>
    </section>

    <section id="messagesTab" style="display:none;">
        <h2 class="section-title">Messages</h2>
        <div id="messagesContainer">Loading messages...</div>
    </section>

    <section id="inquiriesTab" style="display:none;">
        <h2 class="section-title">Property Inquiries</h2>
        <div id="inquiriesContainer">Loading inquiries...</div>
    </section>
</main>

<nav class="bottom-nav">
    <a href="index.html"><span>⌂</span>Home</a>
    <a href="discover.html"><span>🧭</span>Discover</a>
    <a href="post.html" class="post-plus"><span>＋</span></a>
    <a href="inbox.html" class="nav-activity">
        <span>🔔</span>
        <small id="activityNavBadge" class="activity-nav-badge">0</small>
        Activity
    </a>
    <a href="profile.html"><span>◎</span>Profile</a>
</nav>

<script type="module">
import { auth, database } from "./firebase.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { ref, onValue, get, update } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

let currentUser = null;
let unreadNotifications = 0;
let unreadMessages = 0;
let unreadInquiries = 0;

onAuthStateChanged(auth, async (user) => {
    if (!user) {
        window.location.href = "login.html";
        return;
    }

    currentUser = user;

    loadNotifications();
    loadMessages();
    loadInquiries();
});

window.showTab = function(tab) {
    document.getElementById("notificationsTab").style.display = "none";
    document.getElementById("messagesTab").style.display = "none";
    document.getElementById("inquiriesTab").style.display = "none";

    document.querySelectorAll(".tab-btn").forEach(btn => btn.classList.remove("active"));

    if (tab === "notifications") {
        document.getElementById("notificationsTab").style.display = "block";
        document.querySelectorAll(".tab-btn")[0].classList.add("active");
    }

    if (tab === "messages") {
        document.getElementById("messagesTab").style.display = "block";
        document.querySelectorAll(".tab-btn")[1].classList.add("active");
    }

    if (tab === "inquiries") {
        document.getElementById("inquiriesTab").style.display = "block";
        document.querySelectorAll(".tab-btn")[2].classList.add("active");
    }
};

function formatTime(dateString) {
    if (!dateString) return "";
    const date = new Date(dateString);
    if (isNaN(date.getTime())) return "";
    return date.toLocaleString();
}

function setBadge(id, count) {
    const badge = document.getElementById(id);
    if (!badge) return;

    if (count <= 0) {
        badge.style.display = "none";
        badge.textContent = "0";
    } else {
        badge.style.display = "inline-block";
        badge.textContent = count > 99 ? "99+" : count;
    }
}

function updateActivityNavBadge() {
    const total = unreadNotifications + unreadMessages + unreadInquiries;
    const badge = document.getElementById("activityNavBadge");

    if (!badge) return;

    if (total <= 0) {
        badge.style.display = "none";
        badge.textContent = "0";
    } else {
        badge.style.display = "flex";
        badge.textContent = total > 99 ? "99+" : total;
    }
}

function notificationGroupInfo(type) {
    if (type === "follow") return { key:"followers", title:"New Followers", icon:"＋", desc:"People who followed you." };
    if (type === "like" || type === "comment" || type === "reply") return { key:"engagement", title:"Post Engagement", icon:"♥", desc:"Likes, comments, and replies on your content." };
    if (type === "support") return { key:"support", title:"Support Updates", icon:"🛟", desc:"Replies and assistance from QEJA support." };
    if (type === "system") return { key:"system", title:"System Alerts", icon:"🔔", desc:"Important updates from QEJA." };
    if (type === "featured") return { key:"featured", title:"Featured Listing Alerts", icon:"⭐", desc:"Updates about featured listings." };
    return { key:"general", title:"General Notifications", icon:"🔔", desc:"Other account notifications." };
}

function loadNotifications() {
    const container = document.getElementById("notificationsContainer");

    onValue(ref(database, "notifications/" + currentUser.uid), async (snapshot) => {
        container.innerHTML = "";
        unreadNotifications = 0;

        if (!snapshot.exists()) {
            container.innerHTML = "<div class='empty'>No notifications yet.</div>";
            setBadge("notificationCount", 0);
            updateActivityNavBadge();
            return;
        }

        const groups = {};

        snapshot.forEach(child => {
            const item = child.val() || {};
            item.notificationId = item.notificationId || child.key;

            if (item.type === "message" || item.type === "inquiry") return;

            if (!item.read) unreadNotifications++;

            const info = notificationGroupInfo(item.type);
            if (!groups[info.key]) {
                groups[info.key] = {
                    ...info,
                    items: [],
                    unread: 0
                };
            }

            groups[info.key].items.push(item);
            if (!item.read) groups[info.key].unread++;
        });

        const groupList = Object.values(groups);

        if (groupList.length === 0) {
            container.innerHTML = "<div class='empty'>No grouped notifications yet.</div>";
            setBadge("notificationCount", 0);
            updateActivityNavBadge();
            return;
        }

        groupList.sort((a, b) => {
            const aTime = Math.max(...a.items.map(i => new Date(i.createdAt || 0).getTime()));
            const bTime = Math.max(...b.items.map(i => new Date(i.createdAt || 0).getTime()));
            return bTime - aTime;
        });

        groupList.forEach(group => {
            group.items.sort((a,b) => new Date(b.createdAt || 0) - new Date(a.createdAt || 0));

            const card = document.createElement("div");
            card.className = "group-card";

            card.innerHTML = `
                <div class="group-head" onclick="toggleGroup('${group.key}')">
                    <div class="activity-icon">${group.icon}</div>
                    <div class="group-info">
                        <h3>${group.title}</h3>
                        <p>${group.desc}</p>
                    </div>
                    <div class="group-count">${group.items.length}</div>
                </div>

                <div id="group-${group.key}" class="group-details">
                    ${group.items.map(item => `
                        <div class="activity-card">
                            <div class="activity-icon">${group.icon}</div>
                            <div class="activity-body">
                                <h3>${item.fromUserName || "QEJA"}</h3>
                                <p>${item.message || "New activity on your account."}</p>
                                <div class="activity-meta">${formatTime(item.createdAt)}</div>
                                ${item.fromUserId ? `<button class="small-btn dark-btn" onclick="openUser('${item.fromUserId}')">View Profile</button>` : ""}
                                ${!item.read ? `<button class="small-btn orange-btn" onclick="markNotificationRead('${item.notificationId}')">Mark as Read</button>` : ""}
                            </div>
                        </div>
                    `).join("")}
                </div>
            `;

            container.appendChild(card);
        });

        setBadge("notificationCount", unreadNotifications);
        updateActivityNavBadge();
    });
}

window.toggleGroup = function(key) {
    const box = document.getElementById("group-" + key);
    if (!box) return;
    box.style.display = box.style.display === "block" ? "none" : "block";
};

function loadMessages() {
    const container = document.getElementById("messagesContainer");

    onValue(ref(database, "userChats/" + currentUser.uid), async (snapshot) => {
        container.innerHTML = "";
        unreadMessages = 0;

        if (!snapshot.exists()) {
            container.innerHTML = "<div class='empty'>No messages yet. Message users from their profile or listing page.</div>";
            setBadge("messageCount", 0);
            updateActivityNavBadge();
            return;
        }

        const chats = [];
        snapshot.forEach(child => {
            const chat = child.val() || {};
            chat.chatKey = child.key;
            chats.push(chat);
        });

        chats.sort((a,b) => new Date(b.updatedAt || 0) - new Date(a.updatedAt || 0));

        chats.forEach(chat => {
            if (chat.unread === true || chat.unreadCount > 0) unreadMessages++;

            const card = document.createElement("div");
            card.className = "chat-card";

            card.innerHTML = `
                <img class="chat-avatar" src="${chat.otherUserPhoto || 'https://i.pravatar.cc/100'}" onerror="this.src='https://i.pravatar.cc/100'">
                <div class="chat-info">
                    <h3>${chat.otherUserName || "QEJA User"}</h3>
                    <p>${chat.lastMessage || "Open conversation"}</p>
                </div>
                ${(chat.unread === true || chat.unreadCount > 0) ? `<div class="unread-dot"></div>` : ""}
                <button class="small-btn orange-btn" onclick="openChat('${chat.otherUserId}', '${chat.chatKey}')">Open</button>
            `;

            container.appendChild(card);
        });

        setBadge("messageCount", unreadMessages);
        updateActivityNavBadge();
    });
}

function loadInquiries() {
    const container = document.getElementById("inquiriesContainer");

    onValue(ref(database, "leads/" + currentUser.uid), async (snapshot) => {
        container.innerHTML = "";
        unreadInquiries = 0;

        if (!snapshot.exists()) {
            container.innerHTML = "<div class='empty'>No property inquiries yet.</div>";
            setBadge("inquiryCount", 0);
            updateActivityNavBadge();
            return;
        }

        const leads = [];
        snapshot.forEach(child => {
            const lead = child.val() || {};
            lead.leadId = lead.leadId || child.key;
            leads.push(lead);
        });

        leads.sort((a,b) => new Date(b.createdAt || 0) - new Date(a.createdAt || 0));

        for (const lead of leads) {
            if (lead.status !== "read") unreadInquiries++;

            let postTitle = "Property";
            const postSnap = await get(ref(database, "posts/" + lead.postId));
            if (postSnap.exists()) {
                postTitle = postSnap.val().title || "Property";
            }

            const card = document.createElement("div");
            card.className = "activity-card";

            card.innerHTML = `
                <div class="activity-icon">📩</div>
                <div class="activity-body">
                    <h3>Property Inquiry</h3>
                    <p><strong>${lead.interestedUserName || "Someone"}</strong> is interested in: <strong>${postTitle}</strong></p>
                    <p>Email: ${lead.interestedUserEmail || "Not available"}</p>
                    <div class="activity-meta">${formatTime(lead.createdAt)} · Status: ${lead.status || "new"}</div>
                    <button class="small-btn orange-btn" onclick="markLeadRead('${lead.leadId}')">Mark as Read</button>
                    <button class="small-btn dark-btn" onclick="replyByEmail('${lead.interestedUserEmail}')">Reply by Email</button>
                    ${lead.interestedUserId ? `<button class="small-btn orange-btn" onclick="openChat('${lead.interestedUserId}')">Message</button>` : ""}
                </div>
            `;

            container.appendChild(card);
        }

        setBadge("inquiryCount", unreadInquiries);
        updateActivityNavBadge();
    });
}

window.markNotificationRead = async function(notificationId) {
    if (!notificationId) return;
    await update(ref(database, "notifications/" + currentUser.uid + "/" + notificationId), { read: true });
};

window.markLeadRead = async function(leadId) {
    if (!leadId) return;
    await update(ref(database, "leads/" + currentUser.uid + "/" + leadId), { status: "read" });
};

window.replyByEmail = function(email) {
    if (!email) {
        alert("Email not available.");
        return;
    }
    window.location.href = "mailto:" + email;
};

window.openUser = function(userId) {
    if (!userId) return;
    window.location.href = userId === currentUser.uid ? "profile.html" : "user.html?id=" + userId;
};

window.openChat = async function(userId, chatKey = null) {
    if (!userId) return;

    if (chatKey) {
        await update(ref(database, "userChats/" + currentUser.uid + "/" + chatKey), {
            unread: false,
            unreadCount: 0
        });
    }

    window.location.href = "chat.html?user=" + userId;
};
</script>

</body>
</html>
