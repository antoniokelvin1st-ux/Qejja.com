<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Post - Qeja</title>
<link rel="stylesheet" href="style.css">
<style>
body{padding-bottom:80px;background:#f4f4f4;}
.top-appbar{background:#111;color:white;padding:18px 7%;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;}
.logo{font-size:30px;font-weight:900;color:#ff7a18;}
.post-wrap{padding:30px 7% 100px;max-width:800px;margin:auto;}
.post-card{background:white;border-radius:22px;padding:22px;box-shadow:0 8px 20px rgba(0,0,0,.08);}
.post-card input,.post-card select,.post-card textarea{width:100%;padding:14px;margin:8px 0;border-radius:10px;border:1px solid #ddd;box-sizing:border-box;}
.post-card textarea{height:120px;}
.row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.fgroup{margin:12px 0;}
.fgroup label{font-weight:bold;display:block;margin-bottom:5px;}
.drop-zone{border:2px dashed #ff7a18;background:#fff7f0;padding:20px;border-radius:15px;text-align:center;cursor:pointer;position:relative;}
.drop-zone input[type="file"]{position:absolute;inset:0;width:100%;height:100%;opacity:0;cursor:pointer;}
.drop-zone p{margin:0;color:#ff7a18;font-weight:bold;}
.preview-box{display:flex;gap:10px;flex-wrap:wrap;margin:10px 0;}
.preview-box img{width:90px;height:90px;object-fit:cover;border-radius:10px;}
.video-preview{width:100%;border-radius:12px;margin-top:8px;display:none;}
.publish-btn{width:100%;background:#ff7a18;color:white;border:none;padding:15px;border-radius:30px;font-weight:bold;cursor:pointer;margin-top:15px;font-size:16px;}
.publish-btn:disabled{background:#ccc;cursor:not-allowed;}
.cancel-link{color:white;text-decoration:none;font-weight:bold;}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:white;border-top:1px solid #ddd;height:70px;display:flex;justify-content:space-around;align-items:center;z-index:200;}
.bottom-nav a{text-decoration:none;color:#555;font-size:13px;font-weight:bold;text-align:center;}
.bottom-nav span{display:block;font-size:23px;}
.post-plus{background:#111;color:white!important;width:58px;height:58px;border-radius:18px;display:flex;align-items:center;justify-content:center;margin-top:-28px;border:4px solid #ff7a18;}
.post-plus span{font-size:34px;}
@media(max-width:700px){.row{grid-template-columns:1fr;}}
</style>
</head>
<body>

<header class="top-appbar">
    <div class="logo">QEJA</div>
    <a href="index.html" class="cancel-link">Cancel</a>
</header>

<main class="post-wrap">
    <div class="post-card">
        <h1>Create Listing</h1>
        <p>Post a rental, apartment, house, plot, hostel, Airbnb, or property reel.</p>

        <input id="postTitle" type="text" placeholder="Property title e.g Modern bedsitter near KU">

        <div class="row">
            <select id="postCategory">
                <option value="">Select category</option>
                <option value="Rental">Rental</option>
                <option value="Apartment">Apartment</option>
                <option value="House">House</option>
                <option value="Land">Land / Plot</option>
                <option value="Commercial">Commercial</option>
                <option value="Hostel">Hostel</option>
                <option value="Airbnb">Airbnb</option>
                <option value="Office">Office</option>
            </select>
            <select id="postType">
                <option value="Property">Property Post</option>
                <option value="Reel">Property Reel</option>
                <option value="Featured">Featured Listing</option>
            </select>
        </div>

        <div class="row">
            <input id="postLocation" type="text" placeholder="Location e.g Kenyatta University">
            <input id="postPrice" type="text" placeholder="Price e.g Ksh 20,000 / month">
        </div>

        <div class="fgroup">
            <label>Property Photos *</label>
            <div class="drop-zone">
                <input id="postImages" type="file" accept="image/*" multiple>
                <p>📷 Tap to select photos from gallery</p>
            </div>
            <div id="imagePreview" class="preview-box"></div>
        </div>

        <div class="fgroup">
            <label>Property Video / Reel (Optional)</label>
            <div class="drop-zone">
                <input id="postVideoFile" type="file" accept="video/*">
                <p>🎬 Tap to select a video</p>
            </div>
            <video id="videoPreview" class="video-preview" controls></video>
        </div>

        <textarea id="postDescription" placeholder="Describe the property, rooms, security, water, nearby roads, rules, etc."></textarea>

        <h3>Contact Details</h3>

        <div class="row">
            <input id="contactName" type="text" placeholder="Contact name">
            <input id="contactPhone" type="tel" placeholder="Phone number">
        </div>

        <div class="row">
            <input id="whatsappNumber" type="tel" placeholder="WhatsApp number">
            <input id="contactEmail" type="email" placeholder="Contact email">
        </div>

        <select id="visibility">
            <option value="public">Public</option>
            <option value="draft">Save as Draft</option>
        </select>

        <button id="publishBtn" class="publish-btn" type="button">Publish Listing</button>
    </div>
</main>

<nav class="bottom-nav">
    <a href="index.html"><span>🏠</span>Home</a>
    <a href="explore.html"><span>🔍</span>Explore</a>
    <a href="post.html" class="post-plus"><span>+</span></a>
    <a href="inbox.html"><span>💬</span>Inbox</a>
    <a href="profile.html"><span>👤</span>Profile</a>
</nav>

<script type="module">
import { auth, database, uploadToCloudinary } from "./firebase.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { ref, push, set, get } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

let currentUser = null;
let currentUserData = null;

onAuthStateChanged(auth, async (user) => {
    if (!user) { window.location.href = "login.html"; return; }
    currentUser = user;
    const snap = await get(ref(database, "users/" + user.uid));
    currentUserData = snap.exists() ? snap.val() : { fullName: "Qeja User", email: user.email };
    document.getElementById("contactName").value = currentUserData.fullName || "";
    document.getElementById("contactEmail").value = currentUser.email || "";
    document.getElementById("contactPhone").value = currentUserData.phone || "";
});

// Image preview
document.getElementById("postImages").addEventListener("change", function () {
    const preview = document.getElementById("imagePreview");
    preview.innerHTML = "";
    Array.from(this.files).forEach(file => {
        const img = document.createElement("img");
        img.src = URL.createObjectURL(file);
        preview.appendChild(img);
    });
});

// Video preview
document.getElementById("postVideoFile").addEventListener("change", function () {
    const video = document.getElementById("videoPreview");
    if (this.files[0]) {
        video.src = URL.createObjectURL(this.files[0]);
        video.style.display = "block";
    }
});

document.getElementById("publishBtn").addEventListener("click", async () => {
    if (!currentUser) { alert("Please wait, account is still loading."); return; }

    const title       = document.getElementById("postTitle").value.trim();
    const category    = document.getElementById("postCategory").value;
    const type        = document.getElementById("postType").value;
    const location    = document.getElementById("postLocation").value.trim();
    const price       = document.getElementById("postPrice").value.trim();
    const description = document.getElementById("postDescription").value.trim();
    const contactName = document.getElementById("contactName").value.trim();
    const contactPhone = document.getElementById("contactPhone").value.trim();
    const whatsappNumber = document.getElementById("whatsappNumber").value.trim();
    const contactEmail = document.getElementById("contactEmail").value.trim();
    const visibility  = document.getElementById("visibility").value;
    const imageFiles  = document.getElementById("postImages").files;
    const videoFile   = document.getElementById("postVideoFile").files[0];

    if (!title || !category || !location || !price || !description || !contactPhone || imageFiles.length === 0) {
        alert("Please fill title, category, location, price, photos, description and phone number.");
        return;
    }

    const btn = document.getElementById("publishBtn");
    btn.disabled = true;

    try {
        btn.textContent = "Uploading photos...";
        const imageURLs = [];
        for (let i = 0; i < imageFiles.length; i++) {
            btn.textContent = `Uploading photo ${i + 1} of ${imageFiles.length}...`;
            const url = await uploadToCloudinary(imageFiles[i], "image");
            imageURLs.push(url);
        }

        let videoURL = "";
        if (videoFile) {
            btn.textContent = "Uploading video...";
            videoURL = await uploadToCloudinary(videoFile, "video");
        }

        btn.textContent = "Publishing...";
        const postRef = push(ref(database, "posts"));

        await set(postRef, {
            postId: postRef.key,
            ownerId: currentUser.uid,
            ownerName: currentUserData.fullName || "Qeja User",
            ownerEmail: currentUser.email,
            ownerPhoto: currentUserData.photoURL || "",
            title, category, type, location, price,
            imageURL: imageURLs[0],
            imageURLs,
            videoURL,
            description,
            contactName, contactPhone, whatsappNumber, contactEmail,
            visibility,
            status: visibility === "public" ? "public" : "draft",
            likes: 0, likesCount: 0, views: 0, saves: 0, inquiries: 0,
            createdAt: new Date().toISOString()
        });

        alert(visibility === "draft" ? "Draft saved successfully!" : "Listing published successfully!");
        window.location.href = "profile.html";

    } catch (err) {
        console.error(err);
        alert("Failed to publish: " + err.message);
        btn.disabled = false;
        btn.textContent = "Publish Listing";
    }
});
</script>

</body>
</html>
