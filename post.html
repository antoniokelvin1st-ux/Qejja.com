<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Post - Qeja</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="top-appbar" style="background:#111;color:white;padding:18px 7%;display:flex;justify-content:space-between;align-items:center;">
    <div class="logo">QEJA</div>
    <a href="index.html" style="color:white;text-decoration:none;font-weight:bold;">Cancel</a>
</header>

<section style="padding:40px 7% 100px;">
    <div class="property-card" style="max-width:700px;margin:auto;">
        <div class="property-info">
            <h2>Create Property Post</h2>
            <p style="margin-bottom:20px;">Post a rental, house, apartment, plot, or property reel.</p>

            <input id="postTitle" type="text" placeholder="Property title" style="width:100%;padding:14px;margin:8px 0;">
            <input id="postLocation" type="text" placeholder="Location" style="width:100%;padding:14px;margin:8px 0;">
            <input id="postPrice" type="text" placeholder="Price e.g Ksh 25,000/month" style="width:100%;padding:14px;margin:8px 0;">
            <input id="postImage" type="text" placeholder="Image URL" style="width:100%;padding:14px;margin:8px 0;">
            <input id="postVideo" type="text" placeholder="Video/Reel URL optional" style="width:100%;padding:14px;margin:8px 0;">

            <select id="postCategory" style="width:100%;padding:14px;margin:8px 0;">
                <option value="">Select category</option>
                <option value="Rental">Rental</option>
                <option value="Apartment">Apartment</option>
                <option value="House">House</option>
                <option value="Land">Land / Plot</option>
                <option value="Commercial">Commercial</option>
                <option value="Airbnb">Airbnb</option>
            </select>

            <textarea id="postDescription" placeholder="Describe the property..." style="width:100%;height:120px;padding:14px;margin:8px 0;"></textarea>

            <button id="publishBtn" style="width:100%;background:#ff7a18;color:white;border:none;padding:14px;border-radius:30px;cursor:pointer;font-weight:bold;">
                Publish Post
            </button>
        </div>
    </div>
</section>

<nav class="bottom-nav">
    <a href="index.html"><span>🏠</span>Home</a>
    <a href="explore.html"><span>🔍</span>Explore</a>
    <a href="post.html" class="post-plus"><span>+</span></a>
    <a href="inbox.html"><span>💬</span>Inbox</a>
    <a href="profile.html"><span>👤</span>Profile</a>
</nav>

<script type="module">
import { auth, database } from "./firebase.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.4.0/firebase-auth.js";
import { ref, push, set, get } from "https://www.gstatic.com/firebasejs/12.4.0/firebase-database.js";

let currentUser = null;
let currentUserData = null;

onAuthStateChanged(auth, async (user) => {
    if (!user) {
        window.location.href = "login.html";
        return;
    }

    currentUser = user;

    const snap = await get(ref(database, "users/" + user.uid));
    currentUserData = snap.exists() ? snap.val() : {
        fullName: "Qeja User",
        email: user.email
    };
});

document.getElementById("publishBtn").addEventListener("click", async () => {
    const title = document.getElementById("postTitle").value.trim();
    const location = document.getElementById("postLocation").value.trim();
    const price = document.getElementById("postPrice").value.trim();
    const imageURL = document.getElementById("postImage").value.trim();
    const videoURL = document.getElementById("postVideo").value.trim();
    const category = document.getElementById("postCategory").value;
    const description = document.getElementById("postDescription").value.trim();

    if (!title || !location || !price || !imageURL || !category || !description) {
        alert("Please fill all required fields");
        return;
    }

    const postRef = push(ref(database, "posts"));

    await set(postRef, {
        postId: postRef.key,
        ownerId: currentUser.uid,
        ownerName: currentUserData.fullName || "Qeja User",
        ownerEmail: currentUser.email,
        title,
        location,
        price,
        imageURL,
        videoURL,
        category,
        description,
        likes: 0,
        views: 0,
        saves: 0,
        status: "public",
        createdAt: new Date().toISOString()
    });

    alert("Post published successfully!");
    window.location.href = "index.html";
});
</script>

</body>
</html>
