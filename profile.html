<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile - Qeja</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">
    <div class="logo">QEJA</div>

    <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="property.html">Properties</a></li>
        <li><a href="reels.html">Reels</a></li>
        <li><a href="messages.html">Messages</a></li>
        <li><a href="settings.html">Settings</a></li>
    </ul>

    <button id="logoutBtn" class="login-btn" style="border:none;cursor:pointer;">Logout</button>
</nav>

<section style="padding:120px 7% 60px;">

    <div class="property-card" style="max-width:800px;margin:auto;">
        <div class="property-info" style="text-align:center;">

            <img id="profileImage"
                 src="https://i.pravatar.cc/200"
                 alt="Profile"
                 style="width:150px;height:150px;border-radius:50%;margin-bottom:20px;object-fit:cover;">

            <h2 id="profileName">Loading...</h2>
            <p id="profileLocation">Loading location...</p>

            <hr style="margin:30px 0;">

            <h3>Account Information</h3>

            <p><strong>Email:</strong> <span id="userEmail">Loading...</span></p>
            <p><strong>Phone:</strong> <span id="userPhone">Loading...</span></p>
            <p><strong>Role:</strong> <span id="userRole">Loading...</span></p>

            <a href="settings.html" class="login-btn" style="display:inline-block;margin-top:25px;">
                Edit Profile / Settings
            </a>

        </div>
    </div>

</section>

<footer>
    <p>&copy; 2026 Qeja.com. All rights reserved.</p>
</footer>

<script type="module">
import { auth, database } from "./firebase.js";
import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.4.0/firebase-auth.js";
import { ref, get } from "https://www.gstatic.com/firebasejs/12.4.0/firebase-database.js";

onAuthStateChanged(auth, async (user) => {
    if (!user) {
        window.location.href = "login.html";
        return;
    }

    const snapshot = await get(ref(database, "users/" + user.uid));

    if (snapshot.exists()) {
        const data = snapshot.val();

        document.getElementById("profileName").textContent = data.fullName || "Qeja User";
        document.getElementById("profileLocation").textContent = data.location || "Location not added";
        document.getElementById("userEmail").textContent = data.email || user.email;
        document.getElementById("userPhone").textContent = data.phone || "Not provided";
        document.getElementById("userRole").textContent = data.role || "user";

        if (data.photoURL) {
            document.getElementById("profileImage").src = data.photoURL;
        }
    }
});

document.getElementById("logoutBtn").addEventListener("click", async () => {
    await signOut(auth);
    window.location.href = "login.html";
});
</script>

</body>
</html>
